name: Auto PR Feature to Dev

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
      - "chore/**"

concurrency:
  group: auto-pr-feature-to-dev-${{ github.ref_name || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  create-pr:
    if: |
      github.actor != 'github-actions[bot]' &&
      !github.event.deleted &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      (startsWith(github.ref_name, 'feature/') || startsWith(github.ref_name, 'fix/') || startsWith(github.ref_name, 'chore/'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create or reuse draft PR to dev
        uses: actions/github-script@v7
        with:
          script: |
            const { buildAutoPrBody } = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/auto_pr_body_builder.js`);
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headBranch = context.ref.replace("refs/heads/", "");
            const headSha = context.sha;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const baseBranch = "dev";

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status === 404) {
                  try {
                    await github.rest.issues.createLabel({ owner, repo, name, color, description });
                  } catch (createError) {
                    if (createError.status !== 422) {
                      throw createError;
                    }
                  }
                } else {
                  throw error;
                }
              }
            }

            try {
              await github.rest.repos.getBranch({ owner, repo, branch: baseBranch });
            } catch (error) {
              if (error.status === 404) {
                core.warning(`Base branch '${baseBranch}' does not exist yet. Skipping auto PR.`);
                return;
              }
              throw error;
            }

            const existing = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              base: baseBranch,
              head: `${owner}:${headBranch}`,
              per_page: 100,
            });

            const compare = await github.rest.repos.compareCommitsWithBasehead({
              owner,
              repo,
              basehead: `${baseBranch}...${headBranch}`,
            });

            if ((compare.data.ahead_by || 0) === 0) {
              core.info(`Branch ${headBranch} has no commits ahead of ${baseBranch}.`);
              return;
            }

            const branchType = headBranch.split("/")[0] || "feature";
            // Keep PR title close to the real branch name to avoid confusing synthetic prefixes.
            const title = `${headBranch} -> ${baseBranch}`;
            const body = buildAutoPrBody({
              repoRoot: process.env.GITHUB_WORKSPACE,
              flowTemplateName: "feature_to_dev.md",
              includeManualTemplate: false,
              context: {
                HEAD_BRANCH: headBranch,
                BASE_BRANCH: baseBranch,
                HEAD_SHA: headSha,
                RUN_URL: runUrl,
                GATE_STATUS: "push:triggered",
                PR_TYPE_LABEL: `type:${branchType}`,
                TITLE_SUGGESTION: title,
              },
            });

            if (existing.length > 0) {
              const pr = existing[0];
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pr.number,
                body,
              });
              core.info(`PR already exists and body updated: #${pr.number}`);
              return;
            }

            const created = await github.rest.pulls.create({
              owner,
              repo,
              head: headBranch,
              base: baseBranch,
              title,
              body,
              draft: true,
              maintainer_can_modify: true,
            });

            await ensureLabel("auto-pr", "1d76db", "Pull request created automatically");
            await ensureLabel("target:dev", "0e8a16", "Targets the dev branch");
            await ensureLabel("type:feature", "5319e7", "Feature change");
            await ensureLabel("type:fix", "d73a4a", "Bug fix");
            await ensureLabel("type:chore", "fbca04", "Maintenance change");

            const typeLabelMap = {
              feature: "type:feature",
              fix: "type:fix",
              chore: "type:chore",
            };
            const typeLabel = typeLabelMap[branchType] || "type:feature";

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: created.data.number,
              labels: ["auto-pr", "target:dev", typeLabel],
            });

            core.info(`Draft PR created: #${created.data.number}`);
